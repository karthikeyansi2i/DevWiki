version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: devwiki-postgres
    environment:
      POSTGRES_USER: devwiki
      POSTGRES_PASSWORD: devwiki123
      POSTGRES_DB: devwiki
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devwiki"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
